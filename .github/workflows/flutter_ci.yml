name: Flutter Android CI/CD

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ENV_FILES

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Flutter SDK
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.4"

      # Disable Gradle daemon to improve CI stability
      - name: Disable Gradle daemon
        run: |
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.vfs.watch=false" >> android/gradle.properties
          echo "kotlin.compiler.execution.strategy=in-process" >> android/gradle.properties

      # Clean project to avoid cache and watcher issues
      - name: Clean project
        run: flutter clean

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Generate code (freezed, json_serializable, riverpod, etc.)
      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # Create single .env file from GitHub secrets
      - name: Create .env file
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" > .env

      # Analyze code (optional but recommended)
      - name: Analyze project
        run: flutter analyze

      # Build single release APK for internal distribution
      - name: Build APK
        run: flutter build apk --release --split-per-abi --build-number=${{ github.run_number }}

      # Verify APK output exists
      - name: Check APK output
        run: |
          echo "Listing APK path candidates..."
          find build/app/outputs/flutter-apk -type f -name "*.apk" -print

      # Ensure at least one APK exists (fail early if not)
      - name: Assert APK found
        run: |
          APK_FILES=$(find build/app/outputs/flutter-apk -type f -name "*.apk")

          if [ -z "$APK_FILES" ]; then
            echo "No release APK found under build/app/outputs";
            exit 1;
          fi

          echo "Found APK files:"
          echo "$APK_FILES"

          echo "APK_FILES<<EOF" >> $GITHUB_ENV
          echo "$APK_FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # Upload APK to GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Inspire Release v1.0.${{ github.run_number }}
          files: ${{ env.APK_FILES }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
