name: Flutter CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  analyze-build-test:
    name: Analyze, Build, and Test
    runs-on: ubuntu-latest
    environment: ENV_FILES

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate environment file
        run: |
          cat > .env <<EOF
          BASE_URL=${{ secrets.BASE_URL }}
          EOF

      - name: Run build_runner for generated code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run static analysis
        run: flutter analyze

      - name: Run unit tests
        run: flutter test --no-pub

      - name: Run optional integration tests
        if: github.event_name == 'pull_request'
        run: flutter test integration_test/app_smoke_test.dart --no-pub

      - name: Build release APK
        run: flutter build apk --release --no-pub

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventory-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

