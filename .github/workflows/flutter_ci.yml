name: Flutter Android CI/CD

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ENV_FILES

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Flutter SDK
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.4"

      # Disable Gradle daemon to improve CI stability
      - name: Disable Gradle daemon
        run: |
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.vfs.watch=false" >> android/gradle.properties
          echo "kotlin.compiler.execution.strategy=in-process" >> android/gradle.properties

      # Clean project to avoid cache and watcher issues
      - name: Clean project
        run: flutter clean

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Generate code (freezed, json_serializable, riverpod, etc.)
      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # Create single .env file from GitHub secrets
      - name: Create .env file
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" > .env

      # Analyze code (optional but recommended)
      - name: Analyze project
        run: flutter analyze

      # Build release APK
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --build-number=${{ github.run_number }}

      # Verify APK output exists
      - name: Check APK output
        run: |
          echo "Listing APK path candidates..."
          find build/app/outputs -type f -name "*release*.apk" -print

      # Ensure at least one APK exists (fail early if not)
      - name: Assert APK found and normalize path
        run: |
          APK_PATH=$(find build/app/outputs -type f -name "*release*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No release APK found under build/app/outputs";
            exit 1;
          fi
          echo "Found APK: $APK_PATH"

          TARGET_PATH=build/app/outputs/flutter-apk/app-release.apk
          mkdir -p $(dirname "$TARGET_PATH")
          if [ "$APK_PATH" != "$TARGET_PATH" ]; then
            cp -f "$APK_PATH" "$TARGET_PATH"
          fi

          echo "APK_PATH=$TARGET_PATH" >> $GITHUB_ENV

      # Upload APK to GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Inspire Release v1.0.${{ github.run_number }}
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

