name: inventory
description: "Flutter inventory management app"

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  flutter_dotenv: ^6.0.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.0.0
  dio: ^5.9.2

  freezed_annotation: ^3.1.0

  flutter_svg: ^2.2.0
  auto_size_text: ^3.0.0
  flutter_screenutil: ^5.9.3

  permission_handler: ^12.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  flutter_secure_storage: ^9.2.4
  file_picker: ^10.3.2
  qr_code_scanner_plus: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  flutter_gen_runner: ^5.13.0+1

flutter:

  uses-material-design: true

  
  assets:
    - assets/svg/
    - assets/icons/fill/
    - assets/icons/line/
    - assets/icons/tint/
    - .env

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/OpenSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/OpenSans-Light.ttf
          weight: 300
        - asset: assets/fonts/OpenSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/OpenSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/OpenSans-SemiBold.ttf
          weight: 600

# Flutter gen configuration
flutter_gen:
  output: lib/core/assets

  integrations:
    flutter_svg: true

  # derry config
scripts: derry.yaml
